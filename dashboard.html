<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Dashboard - Click2Pay</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

.dash-body{
margin:0;
padding-top:90px;
font-family:'Poppins',sans-serif;
background:#f8fbff;
color:#111;
min-height:100vh;
}


.dash-bg{

position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 20%,rgba(37,99,235,.15),transparent 30%),
radial-gradient(circle at 80% 80%,rgba(0,184,255,.15),transparent 30%),
linear-gradient(120deg,#fff,#f1f8ff);

z-index:-1;

}



.dash-container{

max-width:1200px;
margin:auto;
padding:20px;

}



.dash-welcome{

background:#fff;

padding:25px;

border-radius:25px;

border:1px solid #dbeafe;

box-shadow:
0 15px 40px rgba(0,0,0,.08);

margin-bottom:25px;

}



.dash-welcome h1{

margin:0;

font-size:28px;

color:#2563eb;

}


.dash-welcome p{

margin-top:8px;

color:#64748b;

}




.dash-stats{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

}



.dash-card{

background:white;

padding:25px;

border-radius:22px;

border:1px solid #dbeafe;

box-shadow:
0 10px 30px rgba(0,0,0,.06);

transition:.3s;

}



.dash-card:hover{

transform:translateY(-7px);

}



.dash-icon{

width:50px;

height:50px;

border-radius:15px;

display:flex;

align-items:center;

justify-content:center;

background:#eff6ff;

color:#2563eb;

font-size:24px;

margin-bottom:15px;

}



.dash-card h3{

font-size:14px;

color:#64748b;

margin:0;

}


.dash-card h2{

font-size:28px;

margin:8px 0 0;

}




.dash-box{

margin-top:25px;

background:white;

padding:30px;

border-radius:25px;

border:1px solid #dbeafe;

box-shadow:
0 10px 30px rgba(0,0,0,.06);

}



.dash-box h2{

margin-top:0;

color:#2563eb;

}



.dash-buttons{

display:flex;

gap:15px;

flex-wrap:wrap;

}



.dash-btn{

border:none;

padding:14px 25px;

border-radius:15px;

font-weight:700;

cursor:pointer;

display:flex;

align-items:center;

gap:10px;

}



.dash-primary{

background:#2563eb;

color:white;

}



.dash-secondary{

background:#eff6ff;

color:#2563eb;

}



.dash-grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:20px;

margin-top:25px;

}



.dash-progress{

height:12px;

background:#e2e8f0;

border-radius:20px;

overflow:hidden;

margin-top:15px;

}


.dash-progress span{

display:block;

height:100%;

width:70%;

background:linear-gradient(
90deg,
#2563eb,
#00b8ff
);

}



@media(max-width:900px){

.dash-stats{

grid-template-columns:repeat(2,1fr);

}

.dash-grid{

grid-template-columns:1fr;

}

}



@media(max-width:600px){

.dash-stats{

grid-template-columns:1fr;

}

}

</style>

</head>

<body class="dash-body">


<div class="dash-bg"></div>


<!-- TEMPAT NAVBAR -->
<!-- Copy isi navbar.html kamu di sini -->


<div class="dash-container">


<div class="dash-welcome">

<h1>
<i class="fa-solid fa-house"></i>
Dashboard Click2Pay
</h1>

<p>
Selamat datang kembali. Kelola link, pendapatan dan akun kamu dengan mudah.
</p>

</div>



<div class="dash-stats">



<div class="dash-card">

<div class="dash-icon">
<i class="fa-solid fa-wallet"></i>
</div>

<h3>Saldo Saat Ini</h3>

<h2>
Rp 0
</h2>

</div>




<div class="dash-card">

<div class="dash-icon">
<i class="fa-solid fa-link"></i>
</div>

<h3>Total Link</h3>

<h2>
0
</h2>

</div>




<div class="dash-card">

<div class="dash-icon">
<i class="fa-solid fa-mouse-pointer"></i>
</div>

<h3>Total Klik</h3>

<h2>
0
</h2>

</div>




<div class="dash-card">

<div class="dash-icon">
<i class="fa-solid fa-money-bill-transfer"></i>
</div>

<h3>Pendapatan</h3>

<h2>
Rp 0
</h2>

</div>


</div>






<div class="dash-box">


<h2>
<i class="fa-solid fa-bolt"></i>
Quick Action
</h2>


<br>


<div class="dash-buttons">


<button class="dash-btn dash-primary">

<i class="fa-solid fa-plus"></i>

Create Link

</button>



<button class="dash-btn dash-secondary">

<i class="fa-solid fa-cart-shopping"></i>

Create Sell Link

</button>



</div>


</div>







<div class="dash-grid">



<div class="dash-box">


<h2>
<i class="fa-solid fa-chart-line"></i>
CPM Performance
</h2>


<p style="color:#64748b">

Performa pendapatan bulan ini

</p>



<div class="dash-progress">

<span></span>

</div>


</div>





<div class="dash-box">


<h2>
<i class="fa-solid fa-clock"></i>
Aktivitas

</h2>


<p>

Klik hari ini :
<b>0</b>

</p>


<br>


<p>

Link aktif :
<b>0</b>

</p>


<br>


<p>

Payment :
<b>0</b>

</p>



</div>



</div>



</div>

<script>

/* DASHBOARD ANIMATION */

const dashCards=document.querySelectorAll(
".dash-card,.dash-box"
);


dashCards.forEach((item,index)=>{

item.style.opacity="0";
item.style.transform="translateY(30px)";


setTimeout(()=>{

item.style.transition=".6s";

item.style.opacity="1";

item.style.transform="translateY(0)";


},index*120);


});



/* CLOSE SIDEBAR SAAT KLIK LINK DASHBOARD */

document.querySelectorAll(".c2p-sidebar a")
.forEach(link=>{


link.addEventListener("click",()=>{


if(typeof c2pClose==="function"){

c2pClose();

}


});


});



/* DATA PLACEHOLDER */

const dashboardData={

saldo:0,

totalLink:0,

totalKlik:0,

pendapatan:0

};


/*

Nanti bagian ini diganti API:

fetch("https://worker-domain.workers.dev/user")

.then(res=>res.json())

.then(data=>{

dashboardData=data;

})

*/


</script>


</body>
</html>
