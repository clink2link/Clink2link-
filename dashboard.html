<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard</title>
<link rel="stylesheet" href="/assets/css/dashboard.css">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: sans-serif;
}

/* container */
.container {
  padding: 20px;
}
</style>
</head>

<body class="dashboard">
<div id="navbar"></div>

<div class="container">
  <h2>Dashboard</h2>

  <p>Email: <span id="email"></span></p>
  <p>User ID: <span id="uid"></span></p>

  <p>Username: <span id="username"></span></p>
  <p>Saldo: <span id="saldo"></span></p>
</div>

<div id="footer"></div>

<script>
const supabase = window.supabase.createClient(
  "https://qmrhxsrnvgvggwahufvp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtcmh4c3Judmd2Z2d3YWh1ZnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NzU5ODQsImV4cCI6MjA5OTI1MTk4NH0.gR5vX2-r7hG_vzEcEzPKTIhsOKWA9gNep3lfQcyk724"
);

// LOAD COMPONENT
async function loadComponent(id, file) {
  const res = await fetch(file);
  const html = await res.text();
  document.getElementById(id).innerHTML = html;
}

async function main() {
  // load dulu
  await loadComponent("navbar", "/components/navbar.html");
  await loadComponent("footer", "/components/footer.html");

  // baru init setelah HTML masuk
  initNavbar();
  init();
}

// INIT USER
async function init() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  document.getElementById("email").innerText = user.email;
  document.getElementById("uid").innerText = user.id;

  const { data } = await supabase
    .from("users")
    .select("username")
    .eq("user_id", user.id)
    .single();

  document.getElementById("username").innerText = data?.username || "-";

  const { data: wallet } = await supabase
    .from("wallets")
    .select("balance")
    .eq("user_id", user.id)
    .single();

  document.getElementById("saldo").innerText =
    "Rp " + (wallet?.balance || 0);
}

// INIT NAVBAR (INI YANG TADI ERROR)
function initNavbar() {
  // logout
  document.getElementById("logoutBtn").onclick = async () => {
    await supabase.auth.signOut();
    window.location.href = "index.html";
  };

  // profile toggle
  document.getElementById("profileBtn").onclick = () => {
    document
      .getElementById("profileDropdown")
      .classList.toggle("show");
  };
}

// jalanin
main();
</script>

</body>
</html>
