<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Click2Pay - Payment</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}


body{

background:#f4f8ff;
color:#111827;

}


.container{

width:min(600px,92%);
margin:40px auto;

}



.payment-card{

background:white;

padding:30px;

border-radius:24px;

box-shadow:
0 20px 50px rgba(37,99,235,.12);

}



.title{

text-align:center;

font-size:30px;

font-weight:800;

color:#2563eb;

margin-bottom:25px;

}



.balance{

background:#2563eb;

color:white;

padding:25px;

border-radius:20px;

text-align:center;

margin-bottom:25px;

}


.balance h1{

font-size:32px;

margin-top:10px;

}



label{

font-weight:700;

display:block;

margin-top:15px;

margin-bottom:8px;

}



input,select{

width:100%;

padding:14px;

border-radius:12px;

border:1px solid #dbeafe;

font-size:15px;

outline:none;

}



input:focus,
select:focus{

border-color:#2563eb;

}



button{

width:100%;

margin-top:25px;

padding:15px;

border:none;

border-radius:14px;

background:#2563eb;

color:white;

font-weight:700;

font-size:16px;

cursor:pointer;

}



button:hover{

background:#1d4ed8;

}



.message{

margin-top:15px;

text-align:center;

font-weight:700;

color:#2563eb;

}



.history{

margin-top:30px;

}



.history h3{

margin-bottom:15px;

}



.item{

background:#f8fafc;

padding:15px;

border-radius:14px;

margin-bottom:10px;

border:1px solid #e5e7eb;

}



.status{

font-weight:700;

}



.pending{

color:#f59e0b;

}



.success{

color:#16a34a;

}



.failed{

color:#dc2626;

}



</style>

</head>


<body>



<div class="container">


<div class="payment-card">


<h1 class="title">

<i class="fa-solid fa-money-bill-transfer"></i>

Payment

</h1>



<div class="balance">


<p>Saldo Anda</p>

<h1 id="userBalance">
Rp 0
</h1>


</div>



<label>
Metode Pembayaran
</label>


<select id="method">

<option value="DANA">
DANA
</option>

<option value="BRI">
BRI
</option>

<option value="BCA">
BCA
</option>

<option value="OVO">
OVO
</option>

<option value="GOPAY">
GOPAY
</option>

</select>




<label>
Nomor Tujuan
</label>


<input
id="account"
placeholder="Nomor rekening / e-wallet">



<label>
Nominal Withdraw
</label>


<input
id="amount"
type="number"
placeholder="Contoh: 50000">



<button id="withdrawBtn">

<i class="fa-solid fa-paper-plane"></i>

Request Withdraw

</button>



<div class="message" id="msg"></div>




<div class="history">


<h3>
Riwayat Withdraw
</h3>


<div id="historyList">

Belum ada data.

</div>


</div>



</div>


</div>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script src="js/config.js"></script>

<script src="js/payment.js"></script>


</body>
</html>
