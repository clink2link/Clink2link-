<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Pengaturan • Click2Pay</title>

<script>
if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}
</script>

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/app-ui.css">
<link rel="stylesheet" href="css/settings.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="app-body">

<div class="app-bg"></div>

<div id="navbar"></div>

<div class="app-container">

<!-- TITLE -->
<section class="page-title">
<i class="fa-solid fa-gear"></i>
<div>
<h1>Pengaturan</h1>
<p>Kelola akun dan preferensi aplikasi</p>
</div>
</section>

<!-- ACCOUNT -->
<section class="settings-card">
<h3><i class="fa-solid fa-user"></i> Informasi Akun</h3>

<div class="setting-item">
<span>Email</span>
<strong id="userEmail">-</strong>
</div>

<div class="setting-item">
<span>User ID</span>
<strong id="userId">-</strong>
</div>

</section>

<!-- THEME -->
<section class="settings-card">
<h3><i class="fa-solid fa-moon"></i> Tampilan</h3>

<div class="setting-item">
<span>Dark Mode</span>
<label class="switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>
</div>

</section>

<!-- PASSWORD -->
<section class="settings-card">
<h3><i class="fa-solid fa-lock"></i> Keamanan</h3>

<div class="setting-item">
<button class="btn-primary" onclick="changePassword()">Ganti Password</button>
</div>

</section>

<!-- LOGOUT -->
<section class="settings-card danger">
<h3><i class="fa-solid fa-right-from-bracket"></i> Keluar</h3>

<button class="btn-danger" onclick="logout()">Logout</button>

</section>

</div>

<div id="footer"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/database.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/settings.js"></script>

<script>
fetch("components/navbar.html")
.then(r=>r.text())
.then(h=>{
document.getElementById("navbar").innerHTML=h;
if(typeof c2pInit==="function")c2pInit();
});

fetch("components/footer.html")
.then(r=>r.text())
.then(h=>{
document.getElementById("footer").innerHTML=h;
if(typeof c2pFooterInit==="function")c2pFooterInit();
});
</script>

</body>
</html>
