<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Notifikasi • Click2Pay</title>

<script>
if(localStorage.getItem("theme")==="dark"){
document.documentElement.classList.add("dark");
}
</script>

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/app-ui.css">
<link rel="stylesheet" href="css/notifications.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="app-body">

<div class="app-bg"></div>

<div id="navbar"></div>

<div class="app-container">

<!-- TITLE -->
<section class="page-title">
<i class="fa-solid fa-bell"></i>
<div>
<h1>Notifikasi</h1>
<p>Semua aktivitas akun kamu</p>
</div>
</section>

<!-- ACTION -->
<section class="notif-actions">
<button onclick="markAllRead()">Tandai semua dibaca</button>
</section>

<!-- LIST -->
<section class="notif-list" id="notifList"></section>

</div>

<div id="footer"></div>

<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/notifications.js"></script>

<script>
fetch("components/navbar.html")
.then(r=>r.text())
.then(h=>{
document.getElementById("navbar").innerHTML=h;
if(typeof c2pInit==="function")c2pInit();
});

fetch("components/footer.html")
.then(r=>r.text())
.then(h=>{
document.getElementById("footer").innerHTML=h;
if(typeof c2pFooterInit==="function")c2pFooterInit();
});
</script>

</body>
</html>
