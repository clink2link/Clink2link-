<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WD Transaksi • Click2Pay</title>

<link rel="icon" href="favicon.ico">

<!-- CSS -->
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/footer.css">

<!-- GLOBAL UI (WAJIB) -->
<link rel="stylesheet" href="css/app-ui.css">

<!-- PAGE -->
<link rel="stylesheet" href="css/payment.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body class="app-body">

<div class="app-bg"></div>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="app-container">
<main class="app-main">

<!-- TITLE -->
<section class="page-title">
<h1>
<i class="fa-solid fa-clock-rotate-left"></i>
WD Transaksi
</h1>

<p>
Riwayat penarikan dana yang sudah berhasil diproses.
</p>
</section>

<!-- INFO -->
<section id="wdInfo" class="payment-status">
Memuat transaksi...
</section>

<!-- LIST -->
<section id="wdList" class="wd-list"></section>

</main>
</div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>

<script src="js/database.js" defer></script>
<script src="js/session.js" defer></script>
<script src="js/navbar.js" defer></script>
<script src="js/footer.js" defer></script>
<script src="js/wdtransaksi.js" defer></script>

<script src="assets/js/debug.js" defer></script>

<script>
fetch("components/navbar.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("navbar").innerHTML=html;
if(typeof c2pInit==="function")c2pInit();
});

fetch("components/footer.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("footer").innerHTML=html;
if(typeof c2pFooterInit==="function")c2pFooterInit();
});
</script>

</body>
</html>
