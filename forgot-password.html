<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lupa Kata Sandi - Click2Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">


<style>

:root{
--primary:#2563eb;
--text:#0f172a;
--muted:#64748b;
}


*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

flex-direction:column;

color:var(--text);

background:

radial-gradient(
circle at 15% 20%,
rgba(37,99,235,.25),
transparent 35%
),

radial-gradient(
circle at 85% 80%,
rgba(124,58,237,.25),
transparent 35%
),

linear-gradient(
135deg,
#f8fafc,
#eef2ff
);

}



/* NAVBAR */

.navbar{

position:fixed;

top:0;

width:100%;

padding:14px 0;

background:rgba(255,255,255,.65);

backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,.6);

}


.navbar-brand{

font-size:22px;

font-weight:800;

color:#0f172a;

}


.navbar-brand i{

color:#2563eb;

margin-right:8px;

}



/* MAIN */

.main{

flex:1;

display:flex;

align-items:center;

justify-content:center;

padding:100px 15px 40px;

}



/* CARD */

.card-box{

width:100%;

max-width:380px;

padding:30px;

background:rgba(255,255,255,.75);

backdrop-filter:blur(25px);

border-radius:26px;

border:1px solid rgba(255,255,255,.8);

box-shadow:

0 30px 80px rgba(15,23,42,.15);

animation:fade .6s ease;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:none;

}

}



/* HEADER */


.icon-box{

width:62px;

height:62px;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

border-radius:20px;

background:

linear-gradient(
135deg,
#2563eb,
#7c3aed
);

color:white;

font-size:26px;

box-shadow:

0 15px 35px rgba(37,99,235,.35);

}



h3{

font-size:23px;

font-weight:800;

margin-top:18px;

}



.subtitle{

font-size:13px;

color:var(--muted);

}



/* INPUT */


.form-control{

height:46px;

border-radius:14px;

border:1px solid #e2e8f0;

font-size:14px;

}


.form-control:focus{

border-color:#2563eb;

box-shadow:

0 0 0 4px rgba(37,99,235,.12);

}



/* BUTTON */


.btn-reset{

height:48px;

border-radius:50px;

border:none;

font-weight:700;

font-size:14px;

color:white;

background:

linear-gradient(
135deg,
#2563eb,
#1e40af
);

}



.btn-reset:hover{

box-shadow:

0 15px 35px rgba(37,99,235,.35);

}



/* ALERT */


.alert{

border-radius:14px;

font-size:13px;

}



/* FOOTER */


footer{

padding:30px 0;

background:

linear-gradient(
135deg,
#020617,
#172554
);

color:white;

}


footer p{

font-size:13px;

color:#cbd5e1;

}


</style>

</head>


<body>


<nav class="navbar">

<div class="container">

<a class="navbar-brand">

<i class="fa-solid fa-hand-pointer"></i>

Click2Pay

</a>

</div>

</nav>



<div class="main">


<div class="card-box">


<div class="text-center">


<div class="icon-box">

<i class="fa-solid fa-key"></i>

</div>


<h3>
Lupa Kata Sandi
</h3>


<p class="subtitle">
Masukkan email akun Click2Pay Anda
</p>


</div>



<div id="alert" class="alert"></div>



<form id="forgotForm">


<div class="mb-3">

<label class="form-label">
Email
</label>


<input

type="email"

id="email"

class="form-control"

placeholder="Masukkan email terdaftar"

required>

</div>



<button

class="btn btn-reset w-100">

<i class="fa-solid fa-paper-plane"></i>

&nbsp;

Kirim Reset Password

</button>



</form>



<div class="text-center mt-4">

<a href="login.html"

style="
font-size:13px;
color:#2563eb;
text-decoration:none;
font-weight:600;
">

← Kembali ke login

</a>

</div>



</div>


</div>



<footer>

<div class="container text-center">

<h5>
<i class="fa-solid fa-hand-pointer text-primary"></i>
Click2Pay
</h5>

<p>
Platform shortlink modern untuk monetisasi tautan.
</p>

<p>
© 2026 Click2Pay
</p>

</div>

</footer>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://qmrhxsrnvgvggwahufvp.supabase.co";


const SUPABASE_KEY =
"KEY_ANON_KAMU";


const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



function showAlert(msg,type){

let box =
document.getElementById("alert");

box.style.display="block";

box.className =
"alert alert-"+type;

box.innerHTML=msg;

}



document
.getElementById("forgotForm")
.addEventListener("submit",async function(e){

e.preventDefault();


let email =
document.getElementById("email")
.value
.trim();



let {data:user,error}=await supabaseClient

.from("users")

.select("id")

.eq("email",email)

.maybeSingle();



if(!user){

return showAlert(
"❌ Email belum terdaftar",
"danger"
);

}



let token =
crypto.randomUUID();



let expires =
new Date(
Date.now()+3600000
);



let {error:insertError}=await supabaseClient

.from("password_resets")

.insert({

user_id:user.id,

token:token,

expires_at:expires

});



if(insertError){

console.log(insertError);

return showAlert(
"❌ Gagal membuat reset password",
"danger"
);

}



showAlert(
"✅ Link reset berhasil dibuat",
"success"
);



});


</script>


</body>
</html>
