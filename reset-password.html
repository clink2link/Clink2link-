<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reset Password - Click2Pay</title>


<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<style>

*{
box-sizing:border-box;
}


body{

margin:0;

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

flex-direction:column;

background:

radial-gradient(
circle at top left,
rgba(37,99,235,.25),
transparent 35%
),

radial-gradient(
circle at bottom right,
rgba(124,58,237,.25),
transparent 35%
),

linear-gradient(
135deg,
#f8fafc,
#eef2ff
);

}



.main{

flex:1;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}



.card-box{

width:100%;

max-width:380px;

background:

rgba(255,255,255,.8);

backdrop-filter:blur(25px);

padding:30px;

border-radius:26px;

box-shadow:

0 30px 80px rgba(15,23,42,.15);

}



.icon{

width:60px;

height:60px;

margin:auto;

border-radius:20px;

display:flex;

align-items:center;

justify-content:center;

font-size:25px;

color:white;

background:

linear-gradient(
135deg,
#2563eb,
#7c3aed
);

}



h3{

font-weight:800;

margin-top:18px;

}



p{

font-size:13px;

color:#64748b;

}



.form-control{

height:46px;

border-radius:14px;

}



.btn-reset{

height:48px;

border-radius:50px;

border:none;

background:

linear-gradient(
135deg,
#2563eb,
#1e40af
);

color:white;

font-weight:700;

}



.alert{

border-radius:14px;

font-size:13px;

}



</style>

</head>


<body>


<div class="main">


<div class="card-box">


<div class="text-center">


<div class="icon">

🔐

</div>


<h3>
Password Baru
</h3>


<p>
Buat password baru untuk akun Click2Pay
</p>


</div>



<div id="alert" class="alert"></div>



<form id="resetForm">


<div class="mb-3">

<label>Password Baru</label>

<input

type="password"

id="password"

class="form-control"

placeholder="Minimal 6 karakter"

required>

</div>



<div class="mb-3">

<label>Konfirmasi Password</label>

<input

type="password"

id="confirm"

class="form-control"

placeholder="Ulangi password"

required>

</div>



<button

class="btn btn-reset w-100">

Simpan Password Baru

</button>


</form>


</div>


</div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


const SUPABASE_URL =
"https://qmrhxsrnvgvggwahufvp.supabase.co";


const SUPABASE_KEY =
"KEY_ANON_KAMU";


const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



function showAlert(msg,type){

let box =
document.getElementById("alert");


box.style.display="block";


box.className =
"alert alert-"+type;


box.innerHTML=msg;


}





document
.getElementById("resetForm")
.addEventListener("submit",async function(e){


e.preventDefault();



let password =
document.getElementById("password").value;


let confirm =
document.getElementById("confirm").value;



if(password.length < 6){

return showAlert(
"⚠️ Password minimal 6 karakter",
"warning"
);

}



if(password !== confirm){

return showAlert(
"❌ Password tidak sama",
"danger"
);

}




const params =
new URLSearchParams(
window.location.search
);



let token =
params.get("token");



if(!token){

return showAlert(
"❌ Token reset tidak ditemukan",
"danger"
);

}





// cari token

let {data:reset,error}=await supabaseClient

.from("password_resets")

.select("*")

.eq("token",token)

.maybeSingle();




if(!reset){

return showAlert(
"❌ Token tidak valid",
"danger"
);

}




// cek expired


if(
new Date(reset.expires_at)
<
new Date()
){

return showAlert(
"❌ Token sudah kadaluarsa",
"danger"
);

}




// update password


let {error:updateError}=await supabaseClient

.from("users")

.update({

password_hash:password

})

.eq(
"id",
reset.user_id
);



if(updateError){

console.log(updateError);

return showAlert(
"❌ Gagal update password",
"danger"
);

}





// hapus token bekas

await supabaseClient

.from("password_resets")

.delete()

.eq(
"token",
token
);



showAlert(
"✅ Password berhasil diubah. Mengalihkan ke login...",
"success"
);



setTimeout(()=>{

window.location.href="login.html";

},2000);



});



</script>


</body>

</html>
