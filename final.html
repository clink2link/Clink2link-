<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EarnShortlink - Final Download</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    font-family:Poppins, sans-serif;
    background:#f1f5f9;
}

.container{
    max-width:600px;
    margin:auto;
    padding:20px;
}

.card{
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    margin-bottom:20px;
    text-align:center;
}

.hero{
    background:linear-gradient(135deg,#2563eb,#1d4ed8);
    color:#fff;
    text-align:center;
    padding:40px 20px;
    border-radius:20px;
    margin-bottom:20px;
}

/* BUTTON */
.btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:14px 20px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    cursor:pointer;
}

.btn-primary{
    background:#2563eb;
    color:#fff;
}

.btn-secondary{
    background:#e2e8f0;
    color:#111;
}

/* SPINNER */
.spinner{
    width:50px;
    height:50px;
    border:5px solid #ddd;
    border-top:5px solid #2563eb;
    border-radius:50%;
    margin:20px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{transform:rotate(360deg);}
}

/* HIDDEN */
.hidden{
    display:none;
}

/* ADS */
.adbox{
    text-align:center;
    margin:20px 0;
}

</style>
</head>

<body>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <i class="fa-solid fa-circle-check" style="font-size:40px;"></i>
        <h2>Verifikasi Berhasil</h2>
        <p>Silakan lanjutkan untuk mendapatkan link download</p>
    </div>

    <!-- INFO -->
    <div class="card" id="step1">

        <h3><i class="fa-solid fa-download"></i> Download File</h3>

        <p>Klik tombol untuk memulai proses pengambilan link</p>

        <button class="btn btn-primary" onclick="startTimer()">
            <i class="fa-solid fa-download"></i>
            Download Sekarang
        </button>

    </div>

    <!-- LOADING -->
    <div class="card hidden" id="loadingBox">

        <h3><i class="fa-solid fa-spinner"></i> Menyiapkan Link...</h3>

        <div class="spinner"></div>

        <p id="countdown">10</p>

        <p>Sedang memverifikasi sistem</p>

    </div>

    <!-- ADS 1 -->
    <div class="adbox">
        <i class="fa-solid fa-ad"></i> Adsterra Slot 1
    </div>

    <!-- GET LINK (MUNCUL SETELAH 10 DETIK) -->
    <div class="card hidden" id="getLinkBox">

        <h3><i class="fa-solid fa-link"></i> Link Siap</h3>

        <p>Klik tombol di bawah untuk melanjutkan</p>

        <button class="btn btn-primary" onclick="getLink()">
    <i class="fa-solid fa-rocket"></i>
    GET LINK
</button>

    </div>

    <!-- ADS 2 -->
    <div class="adbox">
        <i class="fa-solid fa-ad"></i> Adsterra Slot 2
    </div>

</div>

<script>

function startTimer(){

    document.getElementById("step1").classList.add("hidden");
    document.getElementById("loadingBox").classList.remove("hidden");

    let time = 10;
    let countdown = document.getElementById("countdown");

    let interval = setInterval(() => {

        time--;
        countdown.innerHTML = time;

        if(time <= 0){
            clearInterval(interval);

            document.getElementById("loadingBox").classList.add("hidden");
            document.getElementById("getLinkBox").classList.remove("hidden");
        }

    }, 1000);
}

</script>
<script>
async function getLink() {

    const token = "{{ token }}";

    const res = await fetch("/final-reward", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "token=" + encodeURIComponent(token)
    });

    // kalau backend redirect sukses
    if (res.redirected) {
        window.location.href = res.url;
        return;
    }

    const text = await res.text();
    alert(text);
}
</script>
</body>
</html>
