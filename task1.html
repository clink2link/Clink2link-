<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task 1 • Click2Pay</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Inter",sans-serif;
}

body{

background:linear-gradient(
135deg,
#eef5ff,
#f8fbff
);

color:#0f172a;

min-height:100vh;

}

a{

text-decoration:none;

}

.container{

width:min(1150px,95%);
margin:auto;

}

/* ===========================
NAVBAR
=========================== */

.navbar{

position:sticky;
top:0;
z-index:999;

backdrop-filter:blur(18px);

background:rgba(255,255,255,.72);

border-bottom:1px solid rgba(255,255,255,.5);

}

.nav-inner{

display:flex;
align-items:center;
justify-content:space-between;

padding:18px 0;

}

.logo{

display:flex;
align-items:center;
gap:12px;

font-size:24px;
font-weight:800;

color:#2563eb;

}

.logo i{

font-size:28px;

}

.nav-right{

display:flex;
gap:12px;

}

.btn{

padding:12px 22px;

border:none;
border-radius:14px;

cursor:pointer;

font-weight:700;

transition:.25s;

}

.btn-login{

background:#ffffff;

color:#2563eb;

border:1px solid rgba(37,99,235,.2);

}

.btn-login:hover{

transform:translateY(-2px);

}

.btn-register{

background:#2563eb;
color:#fff;

box-shadow:0 12px 30px rgba(37,99,235,.25);

}

.btn-register:hover{

background:#1d4ed8;

transform:translateY(-2px);

}

/* ===========================
HERO
=========================== */

.hero{

padding:70px 0 60px;

text-align:center;

}

.hero-box{

background:rgba(255,255,255,.75);

backdrop-filter:blur(18px);

border-radius:28px;

padding:50px;

box-shadow:
0 15px 50px rgba(15,23,42,.08);

}

.hero h1{

font-size:42px;

font-weight:800;

margin-bottom:18px;

}

.hero p{

max-width:720px;

margin:auto;

line-height:1.8;

font-size:16px;

color:#64748b;

}

.download-box{

margin-top:40px;

}

#downloadBtn{

background:#2563eb;

color:#fff;

padding:18px 55px;

font-size:18px;

border:none;

border-radius:18px;

cursor:pointer;

font-weight:700;

transition:.3s;

box-shadow:
0 15px 35px rgba(37,99,235,.28);

}

#downloadBtn:hover{

transform:translateY(-3px);

background:#1d4ed8;

}

.progress-area{

display:none;

margin-top:35px;

}

.progress-bar{

width:100%;

height:18px;

border-radius:30px;

overflow:hidden;

background:#dbeafe;

}

.progress-fill{

width:0%;

height:100%;

background:linear-gradient(
90deg,
#2563eb,
#3b82f6
);

transition:.1s;

}

.progress-text{

margin-top:16px;

font-weight:700;

font-size:18px;

}

#scrollBtn{

display:none;

margin-top:35px;

background:#22c55e;

color:#fff;

padding:16px 40px;

border:none;

border-radius:16px;

font-weight:700;

cursor:pointer;

}

#scrollBtn:hover{

background:#16a34a;

}

</style>

</head>

<body>

<!-- ===========================
NAVBAR
=========================== -->

<header class="navbar">

<div class="container nav-inner">

<a href="/" class="logo">

<i class="fa-solid fa-link"></i>

<span>Click2Pay</span>

</a>

<div class="nav-right">

<button
class="btn btn-login"
onclick="location.href='login.html'">

Login

</button>

<button
class="btn btn-register"
onclick="location.href='register.html'">

Daftar

</button>

</div>

</div>

</header>

<!-- ===========================
HERO
=========================== -->

<section class="hero">

<div class="container">

<div class="hero-box">

<h1>

Download File Gratis

</h1>

<p>

Silakan tekan tombol download di bawah.
Setelah proses selesai kamu akan mendapatkan akses menuju halaman berikutnya.

</p>

<div class="download-box">

<button id="downloadBtn">

<i class="fa-solid fa-download"></i>

Download

</button>

<div class="progress-area" id="progressArea">

<div class="progress-bar">

<div
class="progress-fill"
id="progressFill">

</div>

</div>

<div
class="progress-text"
id="progressText">

0%

</div>

</div>

<button id="scrollBtn">

<i class="fa-solid fa-arrow-down"></i>

Scroll Down

</button>

</div>

</div>

</div>

</section>
<!-- ===========================
GET LINK SECTION
=========================== -->

<section
id="linkSection"
style="padding:90px 0;">

<div class="container">

<div
style="
background:rgba(255,255,255,.75);
backdrop-filter:blur(18px);
border-radius:28px;
padding:55px;
box-shadow:0 15px 45px rgba(15,23,42,.08);
text-align:center;
">

<h2
style="
font-size:34px;
font-weight:800;
margin-bottom:18px;
">

Generate Link

</h2>

<p
style="
max-width:700px;
margin:auto;
line-height:1.8;
color:#64748b;
margin-bottom:40px;
">

Klik tombol di bawah untuk memproses link.
Mohon tunggu hingga proses selesai sebelum melanjutkan.

</p>

<button
id="linkBtn"
style="
background:#2563eb;
color:#fff;
border:none;
padding:18px 55px;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 15px 35px rgba(37,99,235,.25);
">

<i class="fa-solid fa-link"></i>

Link

</button>

<div
id="loadingArea"
style="
display:none;
margin-top:35px;
">

<i
class="fa-solid fa-spinner fa-spin"
style="
font-size:45px;
color:#2563eb;
margin-bottom:15px;
"></i>

<div
style="
font-size:18px;
font-weight:700;
">

Memproses Link...

</div>

<div
id="loadingSecond"
style="
margin-top:10px;
color:#64748b;
">

7 Detik

</div>

</div>

<button
id="nextBtn"
style="
display:none;
margin-top:35px;
background:#22c55e;
color:white;
border:none;
padding:18px 55px;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
box-shadow:0 15px 35px rgba(34,197,94,.28);
">

<i class="fa-solid fa-download"></i>

Download

</button>

</div>

</div>

</section>

<script>

const code=new URLSearchParams(location.search).get("code")||"";

const downloadBtn=document.getElementById("downloadBtn");

const progressArea=document.getElementById("progressArea");

const progressFill=document.getElementById("progressFill");

const progressText=document.getElementById("progressText");

const scrollBtn=document.getElementById("scrollBtn");

downloadBtn.onclick=function(){

downloadBtn.disabled=true;

progressArea.style.display="block";

let percent=0;

const timer=setInterval(()=>{

percent++;

progressFill.style.width=percent+"%";

progressText.innerHTML=percent+"%";

if(percent>=100){

clearInterval(timer);

scrollBtn.style.display="inline-block";

}

},100);

};

scrollBtn.onclick=function(){

document.getElementById("linkSection")
.scrollIntoView({

behavior:"smooth"

});

};

const linkBtn=document.getElementById("linkBtn");

const loadingArea=document.getElementById("loadingArea");

const loadingSecond=document.getElementById("loadingSecond");

const nextBtn=document.getElementById("nextBtn");

linkBtn.onclick=function(){

linkBtn.style.display="none";

loadingArea.style.display="block";

let second=7;

loadingSecond.innerHTML=

second+" Detik";

const timer=setInterval(()=>{

second--;

loadingSecond.innerHTML=

second+" Detik";

if(second<=0){

clearInterval(timer);

loadingArea.style.display="none";

nextBtn.style.display="inline-block";

}

},1000);

};

nextBtn.onclick=function(){

window.location.href=

"task2.html?code="+encodeURIComponent(code);

};

</script>

</body>

</html>
