<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - Click2Pay</title>

<meta name="theme-color" content="#0d6efd">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>


<style>

/* =====================================================
   CLICK2PAY MODERN LOGIN
===================================================== */


:root{

--primary:#0d6efd;
--primary-dark:#084298;

--bg:#f8fafc;
--text:#172033;
--muted:#667085;

--card:#ffffff;

--border:#e5e7eb;

}


*{

box-sizing:border-box;

}


body{

margin:0;

font-family:'Poppins',sans-serif;

background:

radial-gradient(
circle at top right,
rgba(13,110,253,.15),
transparent 35%
),

linear-gradient(
180deg,
#ffffff,
#f8fafc
);

color:var(--text);

min-height:100vh;

display:flex;

flex-direction:column;

}



/* ================= NAVBAR ================= */


.navbar{

position:fixed;

top:0;

width:100%;

z-index:1000;

padding:15px 0;

background:

rgba(255,255,255,.75);

backdrop-filter:blur(18px);

border-bottom:

1px solid rgba(0,0,0,.05);

}


.navbar-brand{

font-size:24px;

font-weight:800;

color:#111827;

}


.navbar-brand i{

color:var(--primary);

margin-right:8px;

}


.navbar .btn{

border-radius:50px;

font-weight:600;

padding:10px 22px;

}



/* ================= MAIN ================= */


.main{

flex:1;

display:flex;

align-items:center;

justify-content:center;

padding:

110px 20px 50px;

}



/* ================= LOGIN CARD ================= */


.login-card{

width:100%;

max-width:410px;

background:

rgba(255,255,255,.95);

border-radius:26px;

padding:32px;

border:

1px solid var(--border);


box-shadow:

0 25px 70px rgba(15,23,42,.08);


animation:

fadeUp .6s ease;

}


@keyframes fadeUp{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}



.login-header{

text-align:center;

margin-bottom:28px;

}


.login-header .logo-icon{

width:65px;

height:65px;

margin:auto;

display:flex;

align-items:center;

justify-content:center;

border-radius:20px;

background:

linear-gradient(
135deg,
#0d6efd,
#084298
);

color:white;

font-size:28px;

box-shadow:

0 15px 35px rgba(13,110,253,.3);

}


.login-header h3{

font-weight:800;

margin-top:18px;

}


.login-header p{

color:var(--muted);

font-size:14px;

}



/* ================= INPUT ================= */


.form-label{

font-size:14px;

font-weight:600;

}


.input-group{

position:relative;

}


.input-group-text{

background:white;

border-left:0;

cursor:pointer;

}


.form-control{

height:48px;

border-radius:14px;

border:1px solid var(--border);

padding-left:15px;

}


.form-control:focus{

border-color:var(--primary);

box-shadow:

0 0 0 4px rgba(13,110,253,.12);

}



/* ================= BUTTON ================= */


.btn-login{

height:50px;

border-radius:50px;

border:none;

background:

linear-gradient(
135deg,
#0d6efd,
#084298
);

color:white;

font-weight:700;

transition:.3s;

}


.btn-login:hover{

transform:translateY(-3px);

box-shadow:

0 15px 35px rgba(13,110,253,.35);

}


.btn-login.loading{

opacity:.7;

pointer-events:none;

}



/* ================= TURNSTILE ================= */


.cf-turnstile{

display:flex;

justify-content:center;

transform:scale(.95);

}



/* ================= ALERT ================= */


.alert{

border-radius:14px;

font-size:14px;

display:none;

}



/* ================= REGISTER LINK ================= */


.register-text{

font-size:14px;

color:var(--muted);

}


.register-text a{

color:var(--primary);

font-weight:600;

text-decoration:none;

}



/* ================= FOOTER ================= */


footer{

background:

linear-gradient(
135deg,
#07101f,
#020617
);

color:white;

padding:35px 0;

}


footer h5{

font-weight:700;

}


footer p{

color:#cbd5e1;

font-size:14px;

margin-bottom:5px;

}


.footer-links a{

color:#cbd5e1;

text-decoration:none;

font-size:14px;

margin:0 8px;

}


.footer-links a:hover{

color:white;

}



/* ================= MOBILE ================= */


@media(max-width:576px){


.navbar-brand{

font-size:20px;

}


.login-card{

padding:25px;

border-radius:22px;

}


.main{

padding-top:100px;

}


}

</style>

</head>


<body>


<nav class="navbar">

<div class="container">

<a class="navbar-brand">

<i class="fa-solid fa-hand-pointer"></i>

Click2Pay

</a>


<a href="register.html"

class="btn btn-outline-primary">

<i class="fa-solid fa-user-plus"></i>

Daftar

</a>


</div>

</nav>


<div class="main">

<div class="login-card">


<div class="login-header">


<div class="logo-icon">

<i class="fa-solid fa-right-to-bracket"></i>

</div>


<h3>

Selamat Datang

</h3>


<p>

Masuk ke dashboard Click2Pay Anda

</p>


</div>


<div id="alert" class="alert"></div>


<form id="loginForm">


<div class="mb-3">


<label class="form-label">

Email / Username

</label>


<input

type="text"

id="loginUser"

class="form-control"

placeholder="Masukkan email atau username"

required>


</div>



<div class="mb-3">


<label class="form-label">

Password

</label>


<div class="input-group">


<input

type="password"

id="loginPass"

class="form-control"

placeholder="Masukkan password"

required>


<span class="input-group-text"

onclick="togglePass()">

<i id="eye"

class="fa-solid fa-eye"></i>

</span>


</div>


</div>

<!-- CLOUDFLARE TURNSTILE -->

<div class="mb-3 mt-4">

<div class="cf-turnstile"

data-sitekey="ISI_SITE_KEY_KAMU">

</div>

</div>


<button

type="submit"

id="loginBtn"

class="btn btn-login w-100">


<i class="fa-solid fa-right-to-bracket"></i>

&nbsp;

Masuk


</button>


</form>


<div class="text-center mt-4">

<p class="register-text">

Belum punya akun?

<a href="register.html">

Daftar sekarang

</a>

</p>

</div>


</div>

</div>



<footer>


<div class="container text-center">


<h5>

<i class="fa-solid fa-hand-pointer text-primary"></i>

Click2Pay

</h5>


<p>

Platform shortlink modern untuk monetisasi tautan.

</p>


<div class="footer-links mt-3">

<a href="#">

Tentang

</a>

<a href="#">

Privasi

</a>

<a href="#">

Syarat

</a>

<a href="#">

Bantuan

</a>

</div>


<p class="mt-3">

© 2026 Click2Pay. All Rights Reserved.

</p>


</div>


</footer>



<script>


const SUPABASE_URL = "https://qmrhxsrnvgvggwahufvp.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtcmh4c3Judmd2Z2d3YWh1ZnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NzU5ODQsImV4cCI6MjA5OTI1MTk4NH0.gR5vX2-r7hG_vzEcEzPKTIhsOKWA9gNep3lfQcyk724";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);



function togglePass(){

    let p=document.getElementById("loginPass");

    p.type =
    p.type==="password"
    ?"text"
    :"password";

}




function showAlert(msg,type){

    let a=document.getElementById("alert");

    a.style.display="block";

    a.className="alert alert-"+type;

    a.innerHTML=msg;

}





document
.getElementById("loginForm")
.addEventListener("submit",async function(e){


e.preventDefault();



let loginUser =
document.getElementById("loginUser").value.trim();


let password =
document.getElementById("loginPass").value;



try{


let {data:user,error}=await supabaseClient

.from("users")

.select("*")

.or(`username.eq.${loginUser},email.eq.${loginUser}`)

.single();




if(error || !user){

    return showAlert(
        "❌ Username/email tidak ditemukan",
        "danger"
    );

}





if(user.password_hash !== password){

    return showAlert(
        "❌ Password salah",
        "danger"
    );

}





// simpan session sederhana

localStorage.setItem(
    "user",
    JSON.stringify({
        id:user.id,
        username:user.username,
        email:user.email
    })
);




showAlert(
    "✅ Login berhasil",
    "success"
);



setTimeout(()=>{

window.location.href="dashboard.html";

},1000);



}catch(err){


console.log(err);


showAlert(
"❌ Server error",
"danger"
);


}



});
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>

</html>
