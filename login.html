<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - Click2Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

/* ================= ROOT ================= */
:root{
    --bg:#f1f5f9;
    --text:#0f172a;
    --card:#ffffff;
    --border:#e2e8f0;
    --primary:#0d6efd;
}

/* DARK MODE */
@media (prefers-color-scheme: dark){
    :root{
        --bg:#020617;
        --text:#ffffff;
        --card:rgba(15,23,42,0.75);
        --border:rgba(255,255,255,0.08);
        --primary:#3b82f6;
    }
}

/* BASE */
body{
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* NAVBAR */
.navbar{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
}

.navbar .nav-link,
.navbar .navbar-brand{
    color:var(--text) !important;
}

/* WRAPPER */
.main{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding-top:90px;
}

/* CARD */
.login-card{
    background:var(--card);
    border-radius:20px;
    padding:30px;
    border:1px solid var(--border);
    box-shadow:0 15px 40px rgba(0,0,0,0.1);
}

/* INPUT */
.form-control{
    border-radius:12px;
    padding:12px;
    border:1px solid var(--border);
}

.form-control:focus{
    border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(13,110,253,0.15);
}

/* BUTTON */
.btn-primary{
    border-radius:30px;
    padding:12px;
    font-weight:600;
}

/* ALERT */
.alert{
    display:none;
}

/* LINK */
a{
    color:var(--primary);
    text-decoration:none;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand fw-bold">
<i class="fa-solid fa-hand-pointer"></i> Click2Pay
</a>

<div class="ms-auto">
<a href="register.html" class="btn btn-outline-primary rounded-pill">
<i class="fa-solid fa-user-plus"></i> Daftar
</a>
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="main">
<div class="container">
<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="login-card">

<h3 class="fw-bold text-center mb-4">
<i class="fa-solid fa-right-to-bracket"></i> Login
</h3>

<div id="alert" class="alert"></div>

<form id="loginForm">

<!-- USER -->
<div class="mb-3">
<label>Email / Username</label>
<input type="text" id="loginUser" class="form-control" required>
</div>

<!-- PASS -->
<div class="mb-3">
<label>Password</label>
<div class="input-group">
<input type="password" id="loginPass" class="form-control" required>
<span class="input-group-text" onclick="togglePass()" style="cursor:pointer;">
<i class="fa-solid fa-eye"></i>
</span>
</div>
</div>

<button class="btn btn-primary w-100">
Login
</button>

</form>

<p class="text-center mt-4">
Belum punya akun?
<a href="register.html">Daftar</a>
</p>

</div>

</div>
</div>
</div>
</div>

<!-- JS -->
<script>
function togglePass(){
    let p = document.getElementById("loginPass");
    p.type = p.type === "password" ? "text" : "password";
}

function showAlert(msg,type){
    let a = document.getElementById("alert");
    a.style.display="block";
    a.className="alert alert-"+type;
    a.innerHTML=msg;
}

/* SIMULASI USER */
let users = [
    {username:"admin",email:"admin@mail.com",password:"123456"}
];

document.getElementById("loginForm").addEventListener("submit",function(e){
    e.preventDefault();

    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;

    let user = users.find(x =>
        (x.username===u || x.email===u) && x.password===p
    );

    if(!user){
        return showAlert("❌ Login gagal","danger");
    }

    showAlert("✅ Login berhasil","success");

    setTimeout(()=>{
        window.location.href="dashboard.html";
    },1000);
});
</script>

</body>
</html>
