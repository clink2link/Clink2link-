<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Login - Click2Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

/* =====================================================
   CLICK2PAY LOGIN PREMIUM
===================================================== */

:root{
    color-scheme:light;

    --primary:#0d6efd;
    --primary-dark:#084298;

    --text:#172033;
    --muted:#667085;

    --bg:#f8fafc;

}


*{
    box-sizing:border-box;
}



body{

    font-family:'Poppins',sans-serif;

    background:

    linear-gradient(
        180deg,
        #ffffff,
        #f8fafc
    );

    color:var(--text);

    min-height:100vh;

}



/* ================= NAVBAR ================= */


.navbar{

    padding:16px 0;

    background:

    rgba(255,255,255,.75);

    backdrop-filter:blur(18px);

    border-bottom:

    1px solid rgba(0,0,0,.05);

}



.navbar-brand{

    font-size:24px;

    font-weight:800;

}



.navbar-brand i{

    color:var(--primary);

}



.navbar .btn{

    border-radius:50px;

}



/* ================= MAIN ================= */


.main{

    min-height:calc(100vh - 150px);

    display:flex;

    align-items:center;

    padding-top:100px;

    padding-bottom:50px;

}



/* ================= CARD ================= */


.login-card{

    background:white;

    border-radius:22px;

    padding:32px;

    max-width:420px;

    margin:auto;

    border:

    1px solid #eef2f7;

    box-shadow:

    0 20px 60px rgba(0,0,0,.08);

    transition:.3s;

}



.login-card:hover{

    transform:translateY(-5px);

    box-shadow:

    0 30px 80px rgba(13,110,253,.15);

}



.login-card h3{

    font-weight:800;

}



.login-card h3 i{

    color:var(--primary);

}



/* ================= INPUT ================= */


.form-control{

    border-radius:14px;

    padding:13px 16px;

    border:1px solid #e5e7eb;

    background:#f8fafc;

}



.form-control:focus{

    border-color:#0d6efd;

    box-shadow:

    0 0 0 .25rem rgba(13,110,253,.15);

}



.input-group-text{

    background:#f8fafc;

    border:1px solid #e5e7eb;

}



/* ================= BUTTON ================= */


.btn-primary{

    background:

    linear-gradient(
        135deg,
        #0d6efd,
        #084298
    );

    border:none;

    border-radius:50px;

    padding:13px;

    font-weight:700;

}



.btn-primary:hover{

    transform:translateY(-3px);

    box-shadow:

    0 15px 35px rgba(13,110,253,.35);

}



/* ================= TURNSTILE ================= */


.cf-turnstile{

    transform:scale(.95);

    transform-origin:center;

}



/* ================= FOOTER ================= */


footer{

    background:

    linear-gradient(
        135deg,
        #07101f,
        #020617
    );

    color:white;

    padding:25px 0;

}



footer p{

    color:#cbd5e1;

    margin:0;

}



/* ================= MOBILE ================= */


@media(max-width:576px){


.login-card{

    padding:25px;

    border-radius:18px;

}


.navbar-brand{

    font-size:21px;

}


}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand fw-bold">
<i class="fa-solid fa-hand-pointer"></i> Click2Pay
</a>

<div class="ms-auto">
<a href="register.html" class="btn btn-outline-primary rounded-pill">
<i class="fa-solid fa-user-plus"></i> Daftar
</a>
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="main">
<div class="container">
<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">

<div class="login-card">

<h3 class="fw-bold text-center mb-4">
<i class="fa-solid fa-right-to-bracket"></i> Login
</h3>

<div id="alert" class="alert"></div>

<form id="loginForm">

<!-- USER -->
<div class="mb-3">
<label>Email / Username</label>
<input type="text" id="loginUser" class="form-control" required>
</div>

<!-- PASS -->
<div class="mb-3">
<label>Password</label>
<div class="input-group">
<input type="password" id="loginPass" class="form-control" required>
<span class="input-group-text" onclick="togglePass()" style="cursor:pointer;">
<i class="fa-solid fa-eye"></i>
</span>
</div>
</div>

<!-- CLOUDFLARE TURNSTILE -->

<div class="mb-3 text-center">

<div class="cf-turnstile"
data-sitekey="ISI_SITE_KEY_KAMU">
</div>

</div>

<button class="btn btn-primary w-100">
Login
</button>

</form>

<p class="text-center mt-4">
Belum punya akun?
<a href="register.html">Daftar</a>
</p>

</div>

</div>
</div>
</div>
</div>

<footer>

<div class="container text-center">

<p>
<i class="fa-solid fa-hand-pointer text-primary"></i>
<strong> Click2Pay</strong>
</p>

<p class="small mt-2">
Platform shortlink modern dengan sistem keamanan terpercaya.
</p>

<p class="small mt-2">
© 2026 Click2Pay. All Rights Reserved.
</p>

</div>

</footer>

<!-- JS -->
<script>
function togglePass(){
    let p = document.getElementById("loginPass");
    p.type = p.type === "password" ? "text" : "password";
}

function showAlert(msg,type){
    let a = document.getElementById("alert");
    a.style.display="block";
    a.className="alert alert-"+type;
    a.innerHTML=msg;
}

/* SIMULASI USER */
let users = [
    {username:"admin",email:"admin@mail.com",password:"123456"}
];

document.getElementById("loginForm").addEventListener("submit",function(e){
    e.preventDefault();

    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;

    let user = users.find(x =>
        (x.username===u || x.email===u) && x.password===p
    );

    if(!user){
        return showAlert("❌ Login gagal","danger");
    }

    showAlert("✅ Login berhasil","success");

    setTimeout(()=>{
        window.location.href="dashboard.html";
    },1000);
});
</script>

</body>
</html>
