<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar - Click2Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
/* BASE */
body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    margin:0;
    transition:0.3s;
}

/* 🌞 LIGHT MODE (SIANG) */
@media (prefers-color-scheme: light){
    body{
        background:linear-gradient(135deg,#ffffff,#dbeafe);
        color:#0f172a;
    }

    .register-card{
        background:rgba(255,255,255,0.95);
        color:#0f172a;
        backdrop-filter:blur(10px);
    }

    .navbar{
        background:rgba(255,255,255,0.85);
        backdrop-filter:blur(10px);
    }
}

/* 🌙 DARK MODE (MALAM) */
@media (prefers-color-scheme: dark){
    body{
        background:linear-gradient(135deg,#0d6efd,#081b5f);
        color:white;
    }

    .register-card{
        background:rgba(255,255,255,0.08);
        color:white;
        backdrop-filter:blur(15px);
    }

    .navbar{
        background:rgba(0,0,0,0.4);
        backdrop-filter:blur(10px);
    }
}

/* CARD */
.register-card{
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 40px rgba(0,0,0,0.25);
    width:100%;
}

/* INPUT */
.form-control{
    border-radius:12px;
    padding:12px;
    font-size:14px;
}

.input-group-text{
    border-radius:12px;
}

/* BUTTON */
.btn-primary{
    border-radius:30px;
    padding:12px;
    font-weight:600;
}

/* ALERT */
.alert{
    display:none;
    border-radius:12px;
    font-size:14px;
}

/* NAVBAR */
.navbar{
    transition:0.3s;
}

/* RESPONSIVE FIX */
@media (max-width:768px){
    .register-card{
        padding:20px;
        border-radius:16px;
    }

    .form-control{
        font-size:13px;
        padding:10px;
    }

    .btn-primary{
        padding:10px;
        font-size:14px;
    }
}
</style>

</head>

<body>

<!-- NAVBAR (SAMA PERSIS STYLE INDEX) -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand fw-bold text-white" href="index.html">
<i class="fa-solid fa-hand-pointer"></i> Click2Pay
</a>

<button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
<i class="fa-solid fa-bars"></i>
</button>

<div class="collapse navbar-collapse" id="navbar">
<ul class="navbar-nav ms-auto align-items-lg-center">

<li class="nav-item">
<a class="nav-link text-white" href="index.html">
<i class="fa-solid fa-house"></i> Beranda
</a>
</li>

<li class="nav-item">
<a class="btn btn-outline-light rounded-pill ms-lg-3" href="login.html">
<i class="fa-solid fa-right-to-bracket"></i> Masuk
</a>
</li>

</ul>
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

<div class="col-lg-5 col-md-7" data-aos="zoom-in">

<div class="register-card">

<h3 class="fw-bold mb-3 text-center">
<i class="fa-solid fa-user-plus"></i> Daftar Akun
</h3>

<div id="alert" class="alert"></div>

<form id="registerForm">

<!-- USERNAME -->
<div class="mb-3">
<label class="form-label">Username</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-user"></i></span>
<input type="text" id="username" class="form-control" required>
</div>
</div>

<!-- EMAIL -->
<div class="mb-3">
<label class="form-label">Email</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
<input type="email" id="email" class="form-control" required>
</div>
</div>

<!-- PASSWORD -->
<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
<input type="password" id="password" class="form-control" required>
<span class="input-group-text" onclick="togglePass('password')" style="cursor:pointer;">
<i class="fa-solid fa-eye"></i>
</span>
</div>
</div>

<!-- CONFIRM -->
<div class="mb-3">
<label class="form-label">Konfirmasi Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
<input type="password" id="confirm" class="form-control" required>
<span class="input-group-text" onclick="togglePass('confirm')" style="cursor:pointer;">
<i class="fa-solid fa-eye"></i>
</span>
</div>
</div>

<!-- CLOUDFLARE -->
<div class="mb-3">
<div class="cf-turnstile" data-sitekey="ISI_SITE_KEY_KAMU"></div>
</div>

<!-- BUTTON -->
<button class="btn btn-primary w-100">
<i class="fa-solid fa-user-plus"></i> Daftar
</button>

</form>

<p class="text-center mt-3">
Sudah punya akun?
<a href="login.html" class="text-warning">Masuk</a>
</p>

</div>

</div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

// SHOW PASSWORD
function togglePass(id){
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// ALERT
function showAlert(msg,type){
    let alert = document.getElementById("alert");
    alert.style.display="block";
    alert.className="alert alert-"+type;
    alert.innerHTML=msg;
}

// SIMULASI DB
let users=[];

// REGISTER
document.getElementById("registerForm").addEventListener("submit",function(e){
    e.preventDefault();

    let u=username.value;
    let e1=email.value;
    let p=password.value;
    let c=confirm.value;

    if(p!==c){
        return showAlert("❌ Password tidak sama","danger");
    }

    let exists=users.find(x=>x.username===u||x.email===e1);

    if(exists){
        return showAlert("⚠️ Username atau Email sudah digunakan","danger");
    }

    users.push({username:u,email:e1,password:p});

    showAlert("✅ Berhasil daftar!","success");
});
</script>

</body>
</html>
