<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar - Click2Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
/* =====================================================
   CLICK2PAY REGISTER PREMIUM STYLE
   SAME AS INDEX LANDING PAGE
===================================================== */

:root{

    --primary:#0d6efd;
    --primary-dark:#084298;
    --secondary:#081b5f;

    --dark:#07101f;
    --text:#172033;
    --muted:#667085;

    --bg:#f8fafc;
    --white:#ffffff;

    --radius:22px;

    --shadow:
    0 20px 60px rgba(0,0,0,.08);

    --shadow-hover:
    0 30px 80px rgba(13,110,253,.18);

}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Poppins',sans-serif;

    background:

    linear-gradient(
        180deg,
        #ffffff,
        #f8fafc
    );

    color:var(--text);

    overflow-x:hidden;

}


/* ================= NAVBAR ================= */


.navbar{

    padding:18px 0;

    background:

    rgba(255,255,255,.75);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border-bottom:

    1px solid rgba(255,255,255,.5);

    transition:.3s;

}


.navbar-brand{

    font-size:26px;

    font-weight:800;

    color:#111827;

}


.navbar-brand i{

    color:var(--primary);

    margin-right:8px;

    filter:

    drop-shadow(
        0 5px 15px rgba(13,110,253,.35)
    );

}



.nav-link{

    color:#344054;

    font-weight:500;

    margin:0 8px;

}



.nav-link:hover{

    color:var(--primary);

}



/* ================= PAGE ================= */


.main-wrapper{

    min-height:100vh;

    display:flex;

    align-items:center;

    padding-top:120px;

    padding-bottom:80px;

}



/* ================= REGISTER CARD ================= */


.register-card{

    background:

    rgba(255,255,255,.9);

    border-radius:

    var(--radius);

    padding:40px;

    border:

    1px solid #eef2f7;

    box-shadow:

    var(--shadow);

    transition:.35s;

    position:relative;

    overflow:hidden;

}



.register-card:hover{

    transform:translateY(-8px);

    box-shadow:

    var(--shadow-hover);

}



.register-card::after{

    content:"";

    position:absolute;

    inset:0;

    border-radius:22px;

    padding:1px;

    background:

    linear-gradient(
        135deg,
        rgba(13,110,253,.35),
        transparent
    );

    -webkit-mask:

    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

    -webkit-mask-composite:xor;

    opacity:0;

    transition:.3s;

}


.register-card:hover::after{

    opacity:1;

}



/* ================= TITLE ================= */


.register-card h3{

    font-weight:800;

}


.register-card h3 i{

    color:var(--primary);

}



/* ================= INPUT ================= */


.form-label{

    font-weight:600;

}



.form-control{

    border-radius:14px;

    padding:14px 18px;

    border:1px solid #e5e7eb;

    background:#f8fafc;

}



.form-control:focus{

    border-color:#0d6efd;

    box-shadow:

    0 0 0 .25rem rgba(13,110,253,.15);

}



.input-group-text{

    background:#f8fafc;

    border:1px solid #e5e7eb;

    color:#0d6efd;

}



/* ================= BUTTON ================= */


.btn-primary{

    background:

    linear-gradient(
        135deg,
        #0d6efd,
        #084298
    );

    border:none;

    border-radius:50px;

    padding:15px;

    font-weight:700;

    position:relative;

    overflow:hidden;

}



.btn-primary::before{

    content:"";

    position:absolute;

    top:0;

    left:-100%;

    width:100%;

    height:100%;

    background:

    linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.4),
        transparent
    );

    transition:.5s;

}



.btn-primary:hover::before{

    left:100%;

}



.btn-primary:hover{

    transform:translateY(-3px);

    box-shadow:

    0 15px 35px rgba(13,110,253,.35);

}



/* ================= ALERT ================= */


.alert{

    border-radius:14px;

}



/* ================= LINK ================= */


a{

    color:var(--primary);

    text-decoration:none;

}



/* ================= TURNSTILE ================= */


.cf-turnstile{

    transform:scale(.95);

    transform-origin:center;

}



/* ================= MOBILE ================= */


@media(max-width:991px){


.navbar{

    background:white;

}


.navbar-nav{

    background:white;

    padding:20px;

    border-radius:20px;

    box-shadow:

    0 20px 50px rgba(0,0,0,.08);

}


}



@media(max-width:576px){


.main-wrapper{

    padding-top:100px;

}


.register-card{

    padding:25px;

    border-radius:18px;

}


.navbar-brand{

    font-size:22px;

}


}
</style>

</head>

<body>

<!-- NAVBAR (SAMA PERSIS STYLE INDEX) -->
<nav class="navbar navbar-expand-lg fixed-top">
<div class="container">

<a class="navbar-brand fw-bold">
<i class="fa-solid fa-hand-pointer"></i> Click2Pay
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar">
<i class="fa-solid fa-bars"></i>
</button>

<div class="collapse navbar-collapse" id="navbar">
<ul class="navbar-nav ms-auto align-items-lg-center">

<li class="nav-item">
<a class="nav-link" href="index.html">
<i class="fa-solid fa-house"></i> Beranda
</a>
</li>

<li class="nav-item">
<a class="btn btn-outline-custom rounded-pill ms-lg-3" href="login.html">
<i class="fa-solid fa-right-to-bracket"></i> Masuk
</a>
</li>

</ul>
</div>

</div>
</nav>

<!-- CONTENT -->
<div class="main-wrapper">

<div class="container">
<div class="row justify-content-center">

<div class="col-lg-5 col-md-7" data-aos="zoom-in">

<div class="register-card">

<h3 class="fw-bold mb-4 text-center">
<i class="fa-solid fa-user-plus"></i> Daftar Akun
</h3>

<div id="alert" class="alert"></div>

<form id="registerForm">

<!-- USERNAME -->
<div class="mb-3">
<label class="form-label">Username</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-user"></i></span>
<input type="text" id="username" class="form-control" required>
</div>
</div>

<!-- EMAIL -->
<div class="mb-3">
<label class="form-label">Email</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
<input type="email" id="email" class="form-control" required>
</div>
</div>

<!-- PASSWORD -->
<div class="mb-3">
<label class="form-label">Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
<input type="password" id="password" class="form-control" required>
<span class="input-group-text" onclick="togglePass('password')" style="cursor:pointer;">
<i class="fa-solid fa-eye"></i>
</span>
</div>
</div>

<!-- CONFIRM -->
<div class="mb-3">
<label class="form-label">Konfirmasi Password</label>
<div class="input-group">
<span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
<input type="password" id="confirm" class="form-control" required>
<span class="input-group-text" onclick="togglePass('confirm')" style="cursor:pointer;">
<i class="fa-solid fa-eye"></i>
</span>
</div>
</div>

<!-- CLOUDFLARE -->
<div class="mb-3">
<div class="cf-turnstile" data-sitekey="ISI_SITE_KEY_KAMU"></div>
</div>

<button class="btn btn-primary w-100">
<i class="fa-solid fa-user-plus"></i> Daftar
</button>

</form>

<p class="text-center mt-4">
Sudah punya akun?
<a href="login.html" class="fw-semibold">Masuk</a>
</p>

</div>
</div>
</div>
</div>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
AOS.init();

// SHOW PASSWORD
function togglePass(id){
    let input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// ALERT
function showAlert(msg,type){
    let alert = document.getElementById("alert");
    alert.style.display="block";
    alert.className="alert alert-"+type;
    alert.innerHTML=msg;
}

// SIMULASI DB
let users = [];

// REGISTER
document.getElementById("registerForm").addEventListener("submit",function(e){
    e.preventDefault();

    let u = document.getElementById("username").value;
    let e1 = document.getElementById("email").value;
    let p = document.getElementById("password").value;
    let c = document.getElementById("confirm").value;

    if(p!==c){
        return showAlert("❌ Password tidak sama","danger");
    }

    let exists = users.find(x=>x.username===u || x.email===e1);

    if(exists){
        return showAlert("⚠️ Username atau Email sudah digunakan","danger");
    }

    users.push({username:u,email:e1,password:p});

    showAlert("✅ Berhasil daftar!","success");
});
</script>

</body>
</html>
