<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar - Click2Pay</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>

:root{
    --primary:#0d6efd;
    --primary-dark:#084298;
    --text:#172033;
    --muted:#667085;
    --bg:#f8fafc;
}


*{
    box-sizing:border-box;
}


body{
    font-family:'Poppins',sans-serif;
    background:
    linear-gradient(180deg,#fff,#f8fafc);
    color:var(--text);
    min-height:100vh;
}


/* NAVBAR */

.navbar{
    padding:15px 0;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(0,0,0,.05);
}


.navbar-brand{
    font-size:23px;
    font-weight:800;
}


.navbar-brand i{
    color:var(--primary);
    filter:drop-shadow(0 5px 15px rgba(13,110,253,.3));
}


.navbar .btn{
    border-radius:50px;
}



/* MAIN */

.main{
    min-height:calc(100vh - 150px);
    display:flex;
    align-items:center;
    padding-top:90px;
    padding-bottom:40px;
}



/* CARD */

.register-card{

    background:white;

    width:100%;
    max-width:430px;

    padding:30px;

    border-radius:22px;

    border:1px solid #eef2f7;

    box-shadow:
    0 20px 60px rgba(0,0,0,.08);

    transition:.3s;
}


.register-card:hover{

    transform:translateY(-5px);

    box-shadow:
    0 30px 80px rgba(13,110,253,.15);

}


.register-card h3{

    font-weight:800;

}


.register-card h3 i{

    color:var(--primary);

}



/* INPUT */

.form-label{

    font-size:14px;
    font-weight:600;
}


.input-group-text{

    background:#f8fafc;

    border:1px solid #e5e7eb;

    color:var(--primary);

}


.form-control{

    background:#f8fafc;

    border:1px solid #e5e7eb;

    padding:12px 14px;

    border-radius:12px;

}


.form-control:focus{

    border-color:var(--primary);

    box-shadow:
    0 0 0 .25rem rgba(13,110,253,.15);

}


/* BUTTON */

.btn-primary{

    background:
    linear-gradient(
        135deg,
        #0d6efd,
        #084298
    );

    border:none;

    border-radius:50px;

    padding:12px;

    font-weight:700;

}


.btn-primary:hover{

    transform:translateY(-3px);

    box-shadow:
    0 15px 35px rgba(13,110,253,.35);

}


/* TURNSTILE */

.cf-turnstile{

    transform:scale(.9);

    transform-origin:center;

}


/* FOOTER */

footer{

    background:
    linear-gradient(
        135deg,
        #07101f,
        #020617
    );

    padding:25px 0;

}


footer p{

    color:#cbd5e1;

    margin:5px;

}



a{

    text-decoration:none;

    color:var(--primary);

}


@media(max-width:576px){

.main{

    padding-top:90px;

}


.register-card{

    padding:25px;

}


.navbar-brand{

    font-size:21px;

}

}

</style>
<body>


<!-- NAVBAR -->

<nav class="navbar fixed-top">

<div class="container">

<a class="navbar-brand">
<i class="fa-solid fa-hand-pointer"></i>
Click2Pay
</a>


<div class="ms-auto">

<a href="login.html" class="btn btn-outline-primary">

<i class="fa-solid fa-right-to-bracket"></i>
Masuk

</a>

</div>


</div>

</nav>




<!-- CONTENT -->

<div class="main">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-5 col-md-7">


<div class="register-card">


<h3 class="text-center mb-4">

<i class="fa-solid fa-user-plus"></i>

Daftar Akun

</h3>



<div id="alert" class="alert d-none"></div>



<form id="registerForm">



<!-- USERNAME -->

<div class="mb-3">

<label class="form-label">
Username
</label>


<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>


<input 
type="text"
id="username"
class="form-control"
placeholder="Username"
required>

</div>

</div>





<!-- EMAIL -->

<div class="mb-3">

<label class="form-label">
Email
</label>


<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-envelope"></i>
</span>


<input 
type="email"
id="email"
class="form-control"
placeholder="Email aktif"
required>


</div>

</div>





<!-- PASSWORD -->

<div class="mb-3">

<label class="form-label">
Password
</label>


<div class="input-group">


<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>



<input
type="password"
id="password"
class="form-control"
placeholder="Password"
required>



<span 
class="input-group-text"
onclick="togglePass('password')"
style="cursor:pointer">

<i class="fa-solid fa-eye"></i>

</span>



</div>

</div>






<!-- CONFIRM PASSWORD -->

<div class="mb-3">

<label class="form-label">
Konfirmasi Password
</label>


<div class="input-group">


<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>



<input
type="password"
id="confirm"
class="form-control"
placeholder="Ulangi password"
required>



<span 
class="input-group-text"
onclick="togglePass('confirm')"
style="cursor:pointer">

<i class="fa-solid fa-eye"></i>

</span>



</div>

</div>





<!-- CLOUDFLARE -->

<div class="mb-3 text-center">


<div class="cf-turnstile"
data-sitekey="ISI_SITE_KEY_KAMU">

</div>


</div>






<button class="btn btn-primary w-100">


<i class="fa-solid fa-user-plus"></i>

Daftar Sekarang


</button>



</form>




<p class="text-center mt-3 mb-0 small">

Sudah punya akun?

<a href="login.html" class="fw-semibold">

Masuk

</a>


</p>



</div>


</div>

</div>

</div>

</div>





<!-- FOOTER -->


<footer>


<div class="container text-center">


<p>

<i class="fa-solid fa-hand-pointer text-primary"></i>

<strong>
Click2Pay
</strong>

</p>


<p class="small">

Platform shortlink modern dengan sistem pembayaran aman.

</p>


<p class="small mb-0">

© 2026 Click2Pay. All Rights Reserved.

</p>



</div>


</footer>






<script>


const SUPABASE_URL = "MASUKKAN_SUPABASE_URL_KAMU";
const SUPABASE_KEY = "MASUKKAN_SUPABASE_ANON_KEY_KAMU";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);



function togglePass(id){

    let input=document.getElementById(id);

    input.type =
    input.type === "password"
    ? "text"
    : "password";

}



function showAlert(message,type){

    let alertBox=document.getElementById("alert");

    alertBox.className=
    "alert alert-"+type;

    alertBox.classList.remove("d-none");

    alertBox.innerHTML=message;

}





document
.getElementById("registerForm")
.addEventListener("submit",async function(e){


e.preventDefault();



let username =
document.getElementById("username").value.trim();


let email =
document.getElementById("email").value.trim();


let password =
document.getElementById("password").value;


let confirm =
document.getElementById("confirm").value;




if(password !== confirm){

    return showAlert(
        "❌ Password tidak sama",
        "danger"
    );

}




if(password.length < 6){

    return showAlert(
        "⚠️ Password minimal 6 karakter",
        "warning"
    );

}





try{


// cek username/email

let {data:exist} = await supabaseClient
.from("users")
.select("id")
.or(`username.eq.${username},email.eq.${email}`)
.single();



if(exist){

    return showAlert(
        "⚠️ Username atau email sudah digunakan",
        "danger"
    );

}




// hash password nanti pindah backend
let {error} = await supabaseClient
.from("users")
.insert({

    username:username,

    email:email,

    password_hash:password

});



if(error){

    throw error;

}




showAlert(
    "✅ Akun berhasil dibuat",
    "success"
);



setTimeout(()=>{

    window.location.href="login.html";

},1000);




}catch(err){


console.log(err);


showAlert(
    "❌ Terjadi kesalahan server",
    "danger"
);


}



});
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
