<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Daftar - Click2Pay</title>

<meta name="theme-color" content="#0d6efd">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<style>
:root{
--primary:#0d6efd;
--primary-dark:#084298;
--text:#172033;
--muted:#667085;
--bg:#f8fafc;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at top right,rgba(13,110,253,.15),transparent 35%),
linear-gradient(180deg,#fff,#f8fafc);
color:var(--text);
min-height:100vh;
display:flex;
flex-direction:column;
}


/* NAVBAR */

.navbar{
padding:15px 0;
background:rgba(255,255,255,.8);
backdrop-filter:blur(18px);
border-bottom:1px solid #eee;
}

.navbar-brand{
font-size:23px;
font-weight:800;
color:#111827;
}

.navbar-brand i{
color:var(--primary);
margin-right:7px;
}

.navbar .btn{
border-radius:50px;
padding:9px 20px;
font-weight:600;
}


/* MAIN */

.main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:100px 20px 40px;
}


/* CARD */

.register-card{
width:100%;
max-width:430px;
background:#fff;
border-radius:24px;
padding:30px;
border:1px solid #e5e7eb;
box-shadow:0 25px 70px rgba(15,23,42,.08);
animation:show .5s ease;
}

@keyframes show{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:none;
}
}

.register-title{
text-align:center;
margin-bottom:25px;
}

.register-title .icon{
width:60px;
height:60px;
margin:auto;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0d6efd,#084298);
color:white;
font-size:25px;
box-shadow:0 15px 35px rgba(13,110,253,.3);
}

.register-title h3{
font-weight:800;
margin-top:15px;
}

.register-title p{
font-size:13px;
color:var(--muted);
}


/* INPUT */

.form-label{
font-size:14px;
font-weight:600;
}

.input-group-text{
background:#fff;
border:1px solid #e5e7eb;
color:#0d6efd;
}

.form-control{
height:46px;
border-radius:0 12px 12px 0;
border:1px solid #e5e7eb;
}

.input-group-text:first-child{
border-radius:12px 0 0 12px;
}

.input-group-text:last-child{
border-radius:0 12px 12px 0;
cursor:pointer;
}

.form-control:focus{
border-color:#0d6efd;
box-shadow:0 0 0 3px rgba(13,110,253,.12);
}


/* BUTTON */

.btn-register{
height:48px;
border-radius:50px;
border:0;
background:linear-gradient(135deg,#0d6efd,#084298);
color:#fff;
font-weight:700;
transition:.3s;
}

.btn-register:hover{
transform:translateY(-3px);
box-shadow:0 15px 35px rgba(13,110,253,.35);
}


/* TURNSTILE */

.cf-turnstile{
display:flex;
justify-content:center;
transform:scale(.95);
}


/* FOOTER */

footer{
background:#07101f;
color:white;
padding:25px 0;
text-align:center;
}

footer p{
color:#cbd5e1;
font-size:13px;
margin:5px;
}


/* MOBILE */

@media(max-width:576px){
.register-card{
padding:24px;
border-radius:20px;
}

.navbar-brand{
font-size:20px;
}
}

</style>
</head>

<body>

<nav class="navbar fixed-top">
<div class="container">

<a class="navbar-brand">
<i class="fa-solid fa-hand-pointer"></i>
Click2Pay
</a>

<a href="login.html" class="btn btn-outline-primary">
<i class="fa-solid fa-right-to-bracket"></i>
Masuk
</a>

</div>
</nav>


<div class="main">
<div class="register-card">

<div class="register-title">

<div class="icon">
<i class="fa-solid fa-user-plus"></i>
</div>

<h3>Buat Akun</h3>

<p>Daftar dan mulai gunakan Click2Pay</p>

</div>


<div id="alert" class="alert"></div>


<form id="registerForm">


<div class="mb-3">
<label class="form-label">Username</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>

<input id="username" class="form-control" required placeholder="Username">

</div>
</div>


<div class="mb-3">
<label class="form-label">Email</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-envelope"></i>
</span>

<input type="email" id="email" class="form-control" required placeholder="Email">

</div>
</div>
<div class="mb-3">
<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="password" id="password" class="form-control" placeholder="Password" required>

<span class="input-group-text" onclick="togglePass('password')">
<i class="fa-solid fa-eye"></i>
</span>

</div>
</div>


<div class="mb-3">
<label class="form-label">Konfirmasi Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input type="password" id="confirm" class="form-control" placeholder="Ulangi password" required>

<span class="input-group-text" onclick="togglePass('confirm')">
<i class="fa-solid fa-eye"></i>
</span>

</div>
</div>


<div class="mb-3">

<div class="cf-turnstile"
data-sitekey="ISI_SITE_KEY_KAMU">
</div>

</div>


<button id="registerBtn" class="btn btn-register w-100">

<i class="fa-solid fa-user-plus"></i>
Daftar Sekarang

</button>


</form>


<p class="text-center mt-4 mb-0" style="font-size:14px;color:#667085">

Sudah punya akun?

<a href="login.html" class="fw-semibold">

Masuk

</a>

</p>


</div>
</div>


<footer>

<div class="container">

<p>
<i class="fa-solid fa-hand-pointer text-primary"></i>
<strong> Click2Pay</strong>
</p>

<p>
Platform shortlink modern dengan keamanan Cloudflare.
</p>

<p>
© 2026 Click2Pay. All Rights Reserved.
</p>

</div>

</footer>



<script>

function togglePass(id){

let input=document.getElementById(id);

input.type =
input.type==="password"
?
"text"
:
"password";

}



function showAlert(msg,type){

let box=document.getElementById("alert");

box.style.display="block";

box.className="alert alert-"+type;

box.innerHTML=msg;

}




document
.getElementById("registerForm")
.addEventListener("submit",function(e){

e.preventDefault();


let btn=document.getElementById("registerBtn");


let username=
document.getElementById("username").value;


let email=
document.getElementById("email").value;


let password=
document.getElementById("password").value;


let confirm=
document.getElementById("confirm").value;



if(password!==confirm){

return showAlert(
"❌ Password tidak sama",
"danger"
);

}



if(password.length < 6){

return showAlert(
"⚠️ Password minimal 6 karakter",
"warning"
);

}



btn.disabled=true;

btn.innerHTML=
'<i class="fa-solid fa-spinner fa-spin"></i> Membuat akun...';



/*
=================================
SIMULASI REGISTER

Ganti nanti dengan API BACKEND
=================================
*/


setTimeout(()=>{


showAlert(
"✅ Akun berhasil dibuat, mengalihkan...",
"success"
);


setTimeout(()=>{

window.location.href="login.html";

},1000);



},1000);



});


</script>


</body>
</html>
