<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Link Ads • Click2Pay</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/create-link.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<main class="container">

    <!-- Semua isi Create Link yang sudah kamu buat -->

</main>

<div id="footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/database.js"></script>
<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/create-link.js"></script>

<script>

/* ==========================
   LOAD NAVBAR
========================== */

fetch("components/navbar.html")
.then(res => res.text())
.then(html => {

    document.getElementById("navbar").innerHTML = html;

    if(typeof c2pInit === "function"){
        c2pInit();
    }

    const logoutBtn = document.getElementById("logoutBtn");

    if(logoutBtn){

        logoutBtn.onclick = async()=>{

            try{
                await database.logout();
            }catch(e){}

            localStorage.clear();
            sessionStorage.clear();

            location.replace("index.html");

        };

    }

});

/* ==========================
   LOAD FOOTER
========================== */

fetch("components/footer.html")
.then(res => res.text())
.then(html => {

    document.getElementById("footer").innerHTML = html;

    if(typeof c2pFooterInit === "function"){
        c2pFooterInit();
    }

});

/* ==========================
   LOAD CREATE LINK
========================== */

window.addEventListener("load",()=>{

    if(typeof loadLinks==="function"){
        loadLinks();
    }

});

/* ==========================
   SEARCH
========================== */

const searchInput=document.getElementById("searchInput");

if(searchInput){

searchInput.addEventListener("input",()=>{

if(typeof searchLinks==="function"){

searchLinks(searchInput.value);

}

});

}

/* ==========================
   FILTER
========================== */

document.querySelectorAll(".link-filter button")
.forEach(btn=>{

btn.onclick=()=>{

document
.querySelectorAll(".link-filter button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

if(typeof filterLinks==="function"){

filterLinks(btn.dataset.filter);

}

};

});

</script>

</body>

</html>
