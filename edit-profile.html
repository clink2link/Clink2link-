<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Edit Profile • Click2Pay</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/edit-profile.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<main class="container">

<section class="page-title">
<i class="fa-solid fa-user-pen"></i>

<div>
<h1>Edit Profile</h1>
<p>Ubah informasi akun Click2Pay kamu.</p>
</div>

</section>


<section class="edit-card">

<div class="edit-header">

<div class="edit-icon">
<i class="fa-solid fa-user-pen"></i>
</div>

<div>
<h2>Edit Username</h2>
<p>Perbarui nama pengguna akun Click2Pay kamu.</p>
</div>

</div>


<div class="edit-form">

<label>
Username Baru
</label>


<div class="input-box">

<i class="fa-solid fa-at"></i>

<input
id="editUsername"
type="text"
placeholder="Masukkan username baru">

</div>


<button
id="saveProfile"
class="btn-primary">

<i class="fa-solid fa-floppy-disk"></i>

Simpan Perubahan

</button>


<div id="editResult"></div>


</div>

</section>



<section class="info-note">

<i class="fa-solid fa-shield-halved"></i>

<div>

<h3>Informasi Username</h3>

<p>
Username digunakan sebagai identitas akun Click2Pay. Gunakan username yang unik dan mudah diingat. Perubahan username akan tersimpan otomatis pada akun kamu.
</p>

</div>

</section>


</main>


<div id="footer"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/database.js"></script>
<script src="js/session.js"></script>
<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/edit-profile.js"></script>

<script src="assets/js/debug.js"></script>


<script>

fetch("components/navbar.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("navbar").innerHTML=html;

if(typeof c2pInit==="function")
c2pInit();
});


fetch("components/footer.html")
.then(res=>res.text())
.then(html=>{
document.getElementById("footer").innerHTML=html;

if(typeof c2pFooterInit==="function")
c2pFooterInit();
});

</script>


</body>
</html>
